# 生产环境 Docker Compose 配置
# 用法：docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # Nginx 反向代理 + SSL 终端
  nginx:
    image: nginx:alpine
    container_name: minimem_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - minimem
    networks:
      - minimem_network
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5-enterprise
    container_name: minimem_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/minimem123_secure}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - minimem_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  # MiniMem Web 服务
  minimem:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: minimem_web
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-minimem123_secure}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - LLM_EMBEDDING_MODEL=${LLM_EMBEDDING_MODEL:-text-embedding-3-small}
      - MINIMEM_API_KEY=${MINIMEM_API_KEY:-}
      - MEMORY_BATCH_ENABLED=true
      - MEMORY_AUTO_BACKUP_ENABLED=true
      - MEMORY_AUTO_BACKUP_INTERVAL_HOURS=6
      - MEMORY_AUTO_BACKUP_KEEP_DAYS=7
      - MEMORY_IDLE_FLUSH_SECONDS=180
      - LOG_LEVEL=INFO
    volumes:
      - ./backups:/app/backups
      - ./logs/minimem:/app/logs
      - ./api_key.local:/app/api_key.local:ro
      - ./.env:/app/.env:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - minimem_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: minimem_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - minimem
    networks:
      - minimem_network
    restart: always

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: minimem_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-grafana_admin_123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - minimem_network
    restart: always

  # 日志收集 - Loki
  loki:
    image: grafana/loki:latest
    container_name: minimem_loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - minimem_network
    restart: always

  # 日志收集 - Promtail
  promtail:
    image: grafana/promtail:latest
    container_name: minimem_promtail
    volumes:
      - ./logs:/var/log:ro
      - ./promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - minimem_network
    restart: always

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  minimem_network:
    driver: bridge
